upstream puma_unitymob {
  server 127.0.0.1:9292;
}

server {
  server_name 143.110.138.67 unitymob.com.br www.unitymob.com.br;
  root /home/unitymob/unitymob-crm/current/public;

  # Gzip Compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

  # Proxy Buffers
  proxy_buffers 16 32k;
  proxy_buffer_size 64k;
  proxy_busy_buffers_size 128k;

  location / {
    proxy_pass http://puma_unitymob;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Host $host;
    proxy_redirect off;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Keepalive
    proxy_http_version 1.1;
    proxy_set_header Connection "";
  }

  location ~ ^/(assets|packs|system|uploads)/ {
    expires max;
    add_header Cache-Control public;
    access_log off;
    gzip_static on;
  }

  error_page 500 502 503 504 /500.html;
  client_max_body_size 250M;
  keepalive_timeout 65;

  listen 443 ssl; # managed by Certbot
  ssl_certificate /etc/letsencrypt/live/unitymob.com.br/fullchain.pem; # managed by Certbot
  ssl_certificate_key /etc/letsencrypt/live/unitymob.com.br/privkey.pem; # managed by Certbot
  include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
  if ($host = unitymob.com.br) {
    return 301 https://$host$request_uri;
  } # managed by Certbot

  listen 80 default_server;
  server_name 143.110.138.67 unitymob.com.br www.unitymob.com.br;
  return 404; # managed by Certbot
}
