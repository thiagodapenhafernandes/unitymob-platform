<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;background:var(--workspace-bg);font-family:var(--font-sans)}
#root{padding:20px;display:grid;grid-template-columns:1fr 220px;gap:16px;align-items:start}
.col{display:grid;gap:12px}
</style></head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Alert, Menu, EmptyState } = window.UnitymobDesignSystem_2a309d;
function Demo(){
  return (
    <>
      <div className="col">
        <Alert tone="warning" title="Módulo Campo desativado">Ative somente quando a operação externa estiver em uso.</Alert>
        <Alert tone="danger" title="4 imóveis com erro de sincronização">Verifique a integração Vista Soft.</Alert>
        <Alert tone="success" title="Publicação concluída">12 imóveis enviados aos portais.</Alert>
        <EmptyState icon="kanban" title="Nenhuma pendência">Tudo em dia por aqui.</EmptyState>
      </div>
      <Menu items={[
        { icon: "eye", label: "Ver detalhes" },
        { icon: "pencil", label: "Editar" },
        { icon: "share", label: "Compartilhar" },
        { separator: true },
        { icon: "trash", label: "Excluir", danger: true },
      ]} />
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
