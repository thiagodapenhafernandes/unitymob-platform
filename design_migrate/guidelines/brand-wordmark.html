<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:#fff;font-family:var(--font-sans);color:var(--ink);display:grid;place-items:center;height:150px}
.lockup{display:flex;align-items:center;gap:11px}
.mk{width:34px;height:34px;border-radius:8px;background:var(--primary);display:grid;place-items:center}
.mk svg{width:21px;height:21px}
.txt{font-family:var(--font-display);font-weight:750;font-size:18px;letter-spacing:var(--tracking-tight);color:var(--ink);line-height:1}
.txt span{display:block;font-family:var(--font-sans);font-weight:600;font-size:11px;letter-spacing:.03em;color:var(--ink-muted);margin-top:3px}
</style></head>
<body><div class="lockup"><span class="mk"><svg viewBox="0 0 100 100" fill="none" stroke="#fff" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"><path d="M22 56 L50 33 L78 56"/><path d="M31 73 L50 58 L69 73" opacity=".5"/></svg></span><span class="txt">Unitymob<span>Plataforma</span></span></div></body></html>
