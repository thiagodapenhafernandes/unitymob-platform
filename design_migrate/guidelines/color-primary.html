<!-- @dsCard group="Colors" viewport="700x150" name="Primary (white-label)" subtitle="Tenant-injected corporate blue — platform default #365f8f" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:#fff;font-family:var(--font-sans)}
.wrap{display:flex;gap:0;padding:20px}
.sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;color:#fff;font-size:11px;font-weight:700}
.sw small{opacity:.85;font-weight:600;font-family:var(--font-mono);font-size:10px}
.sw.light{color:var(--ink)}
</style></head>
<body><div class="wrap">
  <div class="sw" style="background:var(--primary)">Primary<small>#365f8f</small></div>
  <div class="sw" style="background:var(--primary-hover)">Hover<small>#2d5079</small></div>
  <div class="sw light" style="background:var(--primary-soft)">Soft<small>#e4ebf3</small></div>
  <div class="sw light" style="background:var(--primary-softer)">Softer<small>#f1f5f9</small></div>
  <div class="sw" style="background:var(--primary-ink)">Ink<small>#245486</small></div>
</div></body></html>
