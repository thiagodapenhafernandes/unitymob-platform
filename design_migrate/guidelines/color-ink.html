<!-- @dsCard group="Colors" viewport="700x150" name="Ink & text" subtitle="Cool neutral text ramp — headings through disabled" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:#fff;font-family:var(--font-sans)}
.wrap{display:flex;gap:0;padding:20px}
.sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;color:#fff;font-size:11px;font-weight:700}
.sw small{opacity:.85;font-weight:600;font-family:var(--font-mono);font-size:10px}
.sw.light{color:var(--ink)}
</style></head>
<body><div class="wrap">
  <div class="sw" style="background:var(--ink)">Ink<small>#1f2733</small></div>
  <div class="sw" style="background:var(--ink-soft)">Soft<small>#3b4656</small></div>
  <div class="sw" style="background:var(--ink-body)">Body<small>#475467</small></div>
  <div class="sw" style="background:var(--ink-muted)">Muted<small>#697586</small></div>
  <div class="sw light" style="background:var(--ink-faint)">Faint<small>#98a2b3</small></div>
</div></body></html>
