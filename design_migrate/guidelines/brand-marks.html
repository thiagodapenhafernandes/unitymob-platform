<!-- @dsCard group="Brand" viewport="700x150" name="Marks" subtitle="Unitymob platform mark — double up-chevron · app icon" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:#fff;font-family:var(--font-sans);color:var(--ink)}
.wrap{display:flex;gap:26px;align-items:center;padding:24px}
.tile{display:flex;flex-direction:column;align-items:center;gap:8px}
.mark{width:72px;height:72px;border-radius:16px;display:grid;place-items:center}
.cap{font-size:11px;font-weight:700;text-align:center}.cap small{display:block;color:var(--ink-muted);font-weight:400;font-size:10px}
</style></head>
<body><div class="wrap">
  <div class="tile"><div class="mark" style="background:#fff;border:1px solid var(--line)"><img src="../assets/logos/unitymob-mark.svg" style="width:46px" alt="Unitymob mark"></div><span class="cap">Mark<small>platform blue</small></span></div>
  <div class="tile"><div class="mark" style="background:var(--ink)"><img src="../assets/logos/unitymob-mark-white.svg" style="width:46px" alt="Unitymob mark reversed"></div><span class="cap">Reversed<small>on ink</small></span></div>
  <div class="tile"><div class="mark" style="padding:0;overflow:hidden"><img src="../assets/logos/unitymob-appicon.svg" style="width:72px;height:72px;display:block" alt="Unitymob app icon"></div><span class="cap">App icon<small>chevron · #365f8f</small></span></div>
</div></body></html>
