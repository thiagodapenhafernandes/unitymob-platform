<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:#fff;color:var(--ink)}
.wrap{padding:22px;display:grid;gap:16px}

.name{width:70px;font-family:var(--font-sans);font-size:11px;font-weight:800;color:var(--ink-muted);text-transform:uppercase;letter-spacing:.05em}
.samp{font-size:26px;font-weight:600}
.meta{font-family:var(--font-mono);font-size:10px;color:var(--ink-faint)}
</style></head>
<body><div class="wrap">
  <div class="row"><span class="name">Inter</span><span class="samp" style="font-family:var(--font-sans)">Painel operacional — Aa Gg 0123</span></div>
  <div class="row"><span class="name">Outfit</span><span class="samp" style="font-family:var(--font-display);font-weight:700">Unitymob Plataforma</span></div>
  <div class="row"><span class="name">Mono</span><span class="samp" style="font-family:var(--font-mono);font-size:20px">COD-84213 · #365f8f</span></div>
</div></body></html>
