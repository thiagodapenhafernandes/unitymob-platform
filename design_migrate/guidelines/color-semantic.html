<!-- @dsCard group="Colors" viewport="700x160" name="Semantic status" subtitle="Badge fill/text pairs — success, warning, danger, info, purple, cyan" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:#fff;font-family:var(--font-sans);color:var(--ink)}
.wrap{display:flex;flex-wrap:wrap;gap:10px;padding:22px}
.row{display:flex;gap:8px;align-items:center;width:100%}
</style></head>
<body><div class="wrap">
  <div class="row">
    <span class="ax-badge ax-badge--green ax-badge--dot">Ativo</span>
    <span class="ax-badge ax-badge--amber">Pendente</span>
    <span class="ax-badge ax-badge--red">Erro</span>
    <span class="ax-badge ax-badge--blue">Novo</span>
    <span class="ax-badge ax-badge--purple">Proposta</span>
    <span class="ax-badge ax-badge--cyan">Sync</span>
    <span class="ax-badge ax-badge--gray">Rascunho</span>
  </div>
  <div class="row" style="font-family:var(--font-mono);font-size:10px;color:var(--ink-muted);gap:14px">
    <span>success #08875d</span><span>warning #b45309</span><span>danger #b42318</span><span>info #175cd3</span><span>purple #6d28d9</span><span>cyan #0e7490</span>
  </div>
</div></body></html>
