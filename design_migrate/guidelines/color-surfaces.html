<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces & lines" subtitle="Cards, workspace, headers, zebra rows and dividers" -->
<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:#fff;font-family:var(--font-sans)}
.wrap{display:flex;gap:0;padding:20px}
.sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;color:var(--ink);font-size:11px;font-weight:700;border:1px solid var(--line)}
.sw small{color:var(--ink-muted);font-weight:600;font-family:var(--font-mono);font-size:10px}
</style></head>
<body><div class="wrap">
  <div class="sw" style="background:var(--surface)">Surface<small>#ffffff</small></div>
  <div class="sw" style="background:var(--surface-soft)">Soft<small>#f7f8fa</small></div>
  <div class="sw" style="background:var(--surface-header)">Header<small>#eef2f7</small></div>
  <div class="sw" style="background:var(--surface-zebra)">Zebra<small>#fafbfc</small></div>
  <div class="sw" style="background:var(--panel-head)">Panel head<small>#f8fafc</small></div>
</div></body></html>
