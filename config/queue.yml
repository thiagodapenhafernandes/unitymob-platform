default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    # Atendimento WhatsApp (inbound + envio do atendente): worker dedicado de
    # baixa latência — jobs entram aqui via queue_as :realtime.
    - queues: realtime
      threads: 3
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.2
    # Status-only da Meta (sent/delivered/read/failed) chega em rajadas.
    # Mantém os checks de leitura/entrega sem disputar a fila realtime.
    - queues: whatsapp_statuses
      threads: 1
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 1
    # Disparos em massa (campanhas WhatsApp): isolados do atendimento.
    - queues: campaigns
      threads: 3
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.5
    # Integrações e mídia compartilham o worker de processamento pesado.
    # DWV continua serializado pelo Dwv::SyncLockService; duas threads permitem
    # que uma transformação de imagem não bloqueie todos os demais syncs.
    - queues: [dwv, sync, media]
      threads: 2
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 1
    # Operacionais leves compartilham um processo, priorizando check-ins.
    # O catch-all segue EXPLÍCITO — sem "*", que roubaria filas dedicadas.
    - queues: [checkin, default, mailers, solid_queue_recurring]
      threads: 3
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.5

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
