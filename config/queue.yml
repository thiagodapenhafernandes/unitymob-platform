default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    # Atendimento WhatsApp (inbound + envio do atendente): worker dedicado de
    # baixa latência — jobs entram aqui via queue_as :realtime.
    - queues: realtime
      threads: 3
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.2
    # Status-only da Meta (sent/delivered/read/failed) chega em rajadas.
    # Mantém os checks de leitura/entrega sem disputar a fila realtime.
    - queues: whatsapp_statuses
      threads: 1
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 1
    # Disparos em massa (campanhas WhatsApp): isolados do atendimento.
    - queues: campaigns
      threads: 3
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.5
    # DWV mantém fila própria com 1 thread: serializa os syncs por tenant e
    # preserva o lock (Dwv::SyncLockService checa claimed jobs da fila "dwv").
    - queues: dwv
      threads: 1
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 1
    - queues: checkin
      threads: 2
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 1
    # Syncs/imports longos (Vista, SEO e demais integrações quando migradas):
    # poucas threads para não estrangular o resto.
    - queues: sync
      threads: 2
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 1
    # Catch-all EXPLÍCITO — sem "*", que roubaria jobs das filas dedicadas.
    # mailers cobre deliver_later; solid_queue_recurring atende os recurring
    # de `command:` do recurring.yml.
    - queues: [default, mailers, solid_queue_recurring]
      threads: 3
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.5

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
