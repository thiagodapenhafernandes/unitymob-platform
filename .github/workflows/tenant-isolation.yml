name: Isolamento entre contas

on:
  pull_request:
    branches: [develop, master]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  push:
    branches: [develop, master]
    paths-ignore:
      - "docs/**"
      - "**/*.md"

concurrency:
  group: tenant-isolation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tenant-isolation:
    name: Validar isolamento multi-tenant
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: unitymob_crm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d unitymob_crm_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME_TEST: unitymob_crm_test
      SECRET_KEY_BASE: ci-tenant-isolation-secret-key-base

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2.3"
          bundler-cache: true

      - name: Preparar banco de dados
        run: bundle exec rails db:prepare

      - name: Executar contrato de isolamento
        run: bundle exec rake security:tenant_isolation

      - name: Validar carregamento do Rails
        run: bundle exec rails zeitwerk:check
