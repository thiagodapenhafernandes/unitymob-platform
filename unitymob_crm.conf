upstream puma_unitymob {
  server 127.0.0.1:9292;
}

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80 default_server;
  server_name 143.110.138.67 unitymob.com.br www.unitymob.com.br;

  root /home/unitymob/unitymob-crm/current/public;

  # Gzip Compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

  # Proxy Buffers
  proxy_buffers 16 32k;
  proxy_buffer_size 64k;
  proxy_busy_buffers_size 128k;

  location / {
    proxy_pass http://puma_unitymob;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Host $host;
    proxy_redirect off;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Keepalive
    proxy_http_version 1.1;
    proxy_set_header Connection "";
  }

  location /cable {
    proxy_pass http://puma_unitymob/cable;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
  }

  location ~ ^/(assets|packs|system|uploads)/ {
    expires max;
    add_header Cache-Control public;
    access_log off;
    gzip_static on;
  }

  error_page 500 502 503 504 /500.html;
  client_max_body_size 250M;
  keepalive_timeout 65;
}
